<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Heavy-metal contamination overlay – Pb, As, Cd hyperspectral detection</title>
<desc>A false-color overlay map for three co-occurring heavy metals — lead (Pb), arsenic (As), and cadmium (Cd) — detected from drone HSI using 900–1100 nm and 2200–2400 nm metal-oxide and mineral proxy bands. R² 0.92, RMSE 0.09 mg/kg.</desc>

<rect width="100%" height="100%" fill="#161b22" rx="8"/>

<defs>
  <radialGradient id="pb1" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#E24B4A" stop-opacity="0.9"/>
    <stop offset="60%" stop-color="#F09595" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#F09595" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="as1" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#534AB7" stop-opacity="0.85"/>
    <stop offset="60%" stop-color="#AFA9EC" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#AFA9EC" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="cd1" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#EF9F27" stop-opacity="0.88"/>
    <stop offset="60%" stop-color="#FAC775" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#FAC775" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="baseTerrain" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#C0DD97"/>
    <stop offset="50%"  stop-color="#9FE1CB"/>
    <stop offset="100%" stop-color="#D3D1C7"/>
  </linearGradient>
  <filter id="hm_blur"><feGaussianBlur stdDeviation="14"/></filter>
  <clipPath id="hmClip"><rect x="40" y="40" width="420" height="300" rx="6"/></clipPath>
</defs>

<!-- Base terrain -->
<rect x="40" y="40" width="420" height="300" rx="6" fill="url(#baseTerrain)" opacity="0.55"/>

<!-- Pb plumes -->
<ellipse cx="150" cy="170" rx="80" ry="60"  fill="url(#pb1)" filter="url(#hm_blur)" clip-path="url(#hmClip)"/>
<ellipse cx="310" cy="240" rx="55" ry="42"  fill="url(#pb1)" filter="url(#hm_blur)" clip-path="url(#hmClip)"/>
<ellipse cx="390" cy="100" rx="35" ry="28"  fill="url(#pb1)" filter="url(#hm_blur)" clip-path="url(#hmClip)"/>

<!-- As plumes -->
<ellipse cx="220" cy="130" rx="65" ry="48"  fill="url(#as1)" filter="url(#hm_blur)" clip-path="url(#hmClip)"/>
<ellipse cx="380" cy="230" rx="50" ry="38"  fill="url(#as1)" filter="url(#hm_blur)" clip-path="url(#hmClip)"/>

<!-- Cd plumes -->
<ellipse cx="100" cy="90"  rx="45" ry="35"  fill="url(#cd1)" filter="url(#hm_blur)" clip-path="url(#hmClip)"/>
<ellipse cx="290" cy="180" rx="60" ry="44"  fill="url(#cd1)" filter="url(#hm_blur)" clip-path="url(#hmClip)"/>

<!-- Co-contamination zone -->
<ellipse cx="250" cy="170" rx="40" ry="30" fill="#F7C1C1" opacity="0.35" filter="url(#hm_blur)" clip-path="url(#hmClip)"/>
<circle cx="250" cy="170" r="7"   fill="none" stroke="#ff6b6b" stroke-width="1.4" stroke-dasharray="3 2"/>
<circle cx="250" cy="170" r="3"   fill="#ff6b6b"/>

<!-- Contour rings – Pb -->
<ellipse cx="150" cy="170" rx="95"  ry="72"  fill="none" stroke="#E24B4A" stroke-width="0.6" stroke-dasharray="4 3" opacity="0.7" clip-path="url(#hmClip)"/>
<ellipse cx="150" cy="170" rx="125" ry="96"  fill="none" stroke="#F09595" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.45" clip-path="url(#hmClip)"/>

<!-- Contour rings – As -->
<ellipse cx="220" cy="130" rx="82"  ry="62"  fill="none" stroke="#7B72D4" stroke-width="0.6" stroke-dasharray="4 3" opacity="0.65" clip-path="url(#hmClip)"/>

<!-- Survey grid -->
<g stroke="#ffffff" stroke-width="0.25" opacity="0.12">
  <line x1="40"  y1="100" x2="460" y2="100"/>
  <line x1="40"  y1="160" x2="460" y2="160"/>
  <line x1="40"  y1="220" x2="460" y2="220"/>
  <line x1="40"  y1="280" x2="460" y2="280"/>
  <line x1="110" y1="40"  x2="110" y2="340"/>
  <line x1="180" y1="40"  x2="180" y2="340"/>
  <line x1="250" y1="40"  x2="250" y2="340"/>
  <line x1="320" y1="40"  x2="320" y2="340"/>
  <line x1="390" y1="40"  x2="390" y2="340"/>
</g>

<!-- Center markers -->
<circle cx="150" cy="170" r="4" fill="#791F1F" stroke="#fff" stroke-width="1"/>
<circle cx="220" cy="130" r="4" fill="#3C3489" stroke="#fff" stroke-width="1"/>
<circle cx="100" cy="90"  r="3" fill="#854F0B" stroke="#fff" stroke-width="0.8"/>
<circle cx="310" cy="240" r="3" fill="#A32D2D" stroke="#fff" stroke-width="0.8"/>
<circle cx="380" cy="230" r="3" fill="#3C3489" stroke="#fff" stroke-width="0.8"/>

<!-- Map border -->
<rect x="40" y="40" width="420" height="300" rx="6" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>

<!-- Title -->
<text x="250" y="20" text-anchor="middle" font-size="13" font-weight="500" font-family="system-ui,sans-serif" fill="#ffffff">Heavy-metal contamination overlay — Pb, As, Cd</text>
<text x="250" y="34" text-anchor="middle" font-size="11" font-family="system-ui,sans-serif" fill="#aaaaaa">SWIR mineral proxies: 900–1100 nm + 2200–2400 nm · R² 0.92 · RMSE 0.09 mg/kg</text>

<!-- Legend box -->
<rect x="476" y="40" width="188" height="220" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text x="570" y="60" text-anchor="middle" font-size="12" font-weight="500" font-family="system-ui,sans-serif" fill="#ffffff">Metal channels</text>

<!-- Pb swatch -->
<rect x="490" y="72" width="20" height="14" rx="3" fill="#E24B4A" opacity="0.85"/>
<text x="516" y="83" font-size="11" font-family="system-ui,sans-serif" fill="#ffffff">Lead (Pb) · 900–1100 nm</text>
<text x="516" y="95" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Metal-oxide signature</text>

<!-- As swatch -->
<rect x="490" y="110" width="20" height="14" rx="3" fill="#534AB7" opacity="0.85"/>
<text x="516" y="121" font-size="11" font-family="system-ui,sans-serif" fill="#ffffff">Arsenic (As) · 2200–2400 nm</text>
<text x="516" y="133" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Mineral proxy bands</text>

<!-- Cd swatch -->
<rect x="490" y="148" width="20" height="14" rx="3" fill="#EF9F27" opacity="0.85"/>
<text x="516" y="159" font-size="11" font-family="system-ui,sans-serif" fill="#ffffff">Cadmium (Cd) · 900–1100 nm</text>
<text x="516" y="171" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Co-occurrence w/ Pb</text>

<!-- Co-contam swatch -->
<circle cx="500" cy="198" r="6"   fill="none" stroke="#ff6b6b" stroke-width="1.2" stroke-dasharray="3 2"/>
<circle cx="500" cy="198" r="2.5" fill="#ff6b6b"/>
<text x="516" y="195" font-size="11" font-family="system-ui,sans-serif" fill="#ffffff">Co-contamination zone</text>
<text x="516" y="207" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Pb + As + Cd overlap</text>

<line x1="488" y1="220" x2="654" y2="220" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text x="570" y="236" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Inference: 39 ms/cube</text>
<text x="570" y="250" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Validation: pXRF field analysis</text>

<!-- Callout line + labels -->
<line x1="250" y1="170" x2="476" y2="290" stroke="#ff6b6b" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="480" y="287" font-size="11" font-weight="500" font-family="system-ui,sans-serif" fill="#ff6b6b">Pb+As+Cd overlap</text>
<text x="480" y="300" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Agroterrorism flag zone</text>

<!-- Regulatory thresholds box -->
<rect x="476" y="312" width="188" height="80" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text x="570" y="330" text-anchor="middle" font-size="11" font-weight="500" font-family="system-ui,sans-serif" fill="#ffffff">Regulatory thresholds</text>
<text x="488" y="345" font-size="10" font-family="system-ui,sans-serif" fill="#cccccc">Pb: 400 mg/kg (US EPA residential)</text>
<text x="488" y="358" font-size="10" font-family="system-ui,sans-serif" fill="#cccccc">As: 20 mg/kg (WHO guideline)</text>
<text x="488" y="371" font-size="10" font-family="system-ui,sans-serif" fill="#cccccc">Cd: 1.4 mg/kg (EU limit soil)</text>
<text x="488" y="384" font-size="10" font-family="system-ui,sans-serif" fill="#cccccc">Model RMSE: 0.09 mg/kg</text>

<!-- Stats panel -->
<rect x="40" y="360" width="420" height="62" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text x="55" y="378" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">R² = 0.92 · RMSE = 0.09 mg/kg · 3D CNN + SPA 12-band subset</text>
<text x="55" y="393" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">Pb bands: 965, 1048 nm · As bands: 2230, 2340 nm · Cd bands: 910, 980 nm</text>
<text x="55" y="408" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">Edge inference: 39 ms/cube · Jetson Orin Nano · real-time detection</text>

<text x="40" y="450" font-size="10" font-family="system-ui,sans-serif" fill="#666666">⚠ Anonymized · lab validation via pXRF · coordinates suppressed · research use only</text>

</svg>
